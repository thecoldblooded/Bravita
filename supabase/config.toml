# Explicit Edge Function auth posture.
# Functions with public GET links or secret-header guest flows keep verify_jwt disabled.
# Admin/authenticated-only functions enforce verify_jwt at platform level.

# Leaked password protection is managed from the hosted Supabase Auth settings.
# Keeping unsupported Auth keys in local config breaks Supabase CLI migration/drift checks.

[functions.send-order-email]
verify_jwt = true

[functions.send-support-email]
verify_jwt = true

[functions.send-welcome-email]
verify_jwt = false

[functions.send-test-email]
verify_jwt = true

[functions.sync-to-billionmail]
verify_jwt = true

[functions.sync-auth-templates]
verify_jwt = true

[functions.bakiyem-init-3d]
verify_jwt = true

[functions.bakiyem-3d-return]
verify_jwt = false

[functions.bakiyem-void]
verify_jwt = true

[functions.bakiyem-capture]
verify_jwt = true

[functions.bakiyem-tokenize-card]
verify_jwt = true

[functions.bakiyem-refund]
verify_jwt = true

[functions.payment-maintenance]
verify_jwt = false

[functions.verify-promo-code]
verify_jwt = true

[functions.create-support-ticket]
verify_jwt = true

[functions.create-bank-order]
verify_jwt = true

[functions.admin-rpc]
verify_jwt = true
