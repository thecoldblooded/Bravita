name: Production Release Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  release-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure npm fetch retry behavior
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: npm ci

      - name: Add local npm binaries to PATH
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"
  
      - name: Authenticate Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Link Supabase project
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing secret: SUPABASE_PROJECT_REF"
            exit 1
          fi

          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "Missing secret: SUPABASE_DB_PASSWORD"
            exit 1
          fi

          supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Pre-pull Supabase edge runtime with retry
        run: |
          set -euo pipefail
          image="public.ecr.aws/supabase/edge-runtime:v1.74.1"
          for attempt in 1 2 3 4 5; do
            echo "Pull attempt $attempt for $image"
            if docker pull "$image"; then
              exit 0
            fi
            sleep $((attempt * 15))
          done
          echo "Failed to pull $image after multiple attempts"
          exit 1

      - name: Run release smoke gate
        env:
          CI: true
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npm run release:smoke
