name: Production Release Smoke

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  release-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure npm fetch retry behavior
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000

      - name: Install dependencies
        run: npm ci

      - name: Add local npm binaries to PATH
        run: echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Authenticate Supabase CLI
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing secret: SUPABASE_ACCESS_TOKEN"
            exit 1
          fi

          supabase login --token "$SUPABASE_ACCESS_TOKEN"

      - name: Link Supabase project
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_PROJECT_REF:-}" ]; then
            echo "Missing secret: SUPABASE_PROJECT_REF"
            exit 1
          fi

          if [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "Missing secret: SUPABASE_DB_PASSWORD"
            exit 1
          fi

          supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Run release smoke gate
        env:
          CI: true
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: npm run release:smoke

      - name: Upload Playwright report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: production-release-smoke-playwright-report-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 7
          path: |
            playwright-report
            test-results
